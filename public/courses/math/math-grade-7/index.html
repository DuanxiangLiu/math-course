<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初一数学课程</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="breadcrumb">
                <a href="../../../">首页</a> / 
                <a href="../">数学</a> / 
                <span>七年级上册</span>
            </nav>
            <div class="header-main">
                <h1 class="logo">📖 七年级上册</h1>
                <p class="subtitle">初一数学（上册）</p>
            </div>
            <nav class="nav">
                <a href="#chapters" class="nav-link active">章节目录</a>
                <a href="#interdisciplinary" class="nav-link">跨学科拓展</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <section id="chapters" class="section">
            <div class="container">
                <h2 class="section-title">课程章节</h2>
                <div class="chapter-grid">
                    <div class="chapter-card coming-soon">
                        <div class="chapter-icon">📐</div>
                        <h3 class="chapter-title">第一章 有理数 <span class="badge">敬请期待</span></h3>
                        <p class="chapter-desc">正数、负数、有理数的加减乘除</p>
                    </div>
                    <div class="chapter-card coming-soon">
                        <div class="chapter-icon">📊</div>
                        <h3 class="chapter-title">第二章 整式的加减 <span class="badge">敬请期待</span></h3>
                        <p class="chapter-desc">单项式、多项式、合并同类项</p>
                    </div>
                    <div class="chapter-card coming-soon">
                        <div class="chapter-icon">🔢</div>
                        <h3 class="chapter-title">第三章 一元一次方程 <span class="badge">敬请期待</span></h3>
                        <p class="chapter-desc">方程的概念、解方程、实际应用</p>
                    </div>
                    <div class="chapter-card coming-soon">
                        <div class="chapter-icon">📏</div>
                        <h3 class="chapter-title">第四章 几何图形初步 <span class="badge">敬请期待</span></h3>
                        <p class="chapter-desc">点、线、面、角、相交线</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="interdisciplinary" class="section">
            <div class="container">
                <h2 class="section-title">跨学科拓展</h2>
                <p class="section-subtitle">探索数学与其他学科的奇妙联系</p>
                <div class="chapter-grid">
                    <a href="../../interdisciplinary/music-and-math/" class="chapter-card">
                        <div class="chapter-icon">🎵</div>
                        <h3 class="chapter-title">当数学遇见音乐</h3>
                        <p class="chapter-desc">三分损益法、十二平均律、坐标与函数</p>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 初一数学课程. 一起学习，共同进步！</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
